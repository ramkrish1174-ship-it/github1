name: EduFlow CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  backend-tests:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: eduflow-backend

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306

        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: mysql+pymysql://root:root@127.0.0.1:3306/testdb
      MAIL_USERNAME: test@gmail.com
      MAIL_PASSWORD: testpassword
      MAIL_FROM: test@gmail.com
      MAIL_SERVER: smtp.gmail.com
      MAIL_PORT: 587
      SECRET_KEY: 8f3d9a2c7e4b1f6a9c0d2e5f7g8h1j3k
      ALGORITHM: HS256

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest

  frontend-tests:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: eduflow-frontend

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Start frontend server
        run: |
          npm run dev &
          sleep 15

      - name: Run Playwright Tests
        run: npx playwright test